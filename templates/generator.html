<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>代码生成 - 宝信 API 平台</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --primary: #534AB7; --primary-light: #CECBF6; --primary-bg: #EEEDFE;
  --success: #3B6D11; --success-light: #C0DD97; --success-bg: #EAF3DE;
  --danger: #A32D2D; --danger-light: #F7C1C1; --danger-bg: #FCEBEB;
  --warning: #BA7517; --warning-light: #FAC775; --warning-bg: #FAEEDA;
  --gray-100: #F1EFE8; --gray-200: #D3D1C7; --gray-400: #888780; --gray-600: #5F5E5A; --gray-900: #2C2C2A;
  --blue: #378ADD;
}
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--gray-100); color: var(--gray-900); line-height: 1.5; }
.sidebar { position: fixed; left: 0; top: 0; bottom: 0; width: 240px; background: var(--gray-900); color: white; display: flex; flex-direction: column; z-index: 100; }
.sidebar .logo { padding: 20px 16px; font-size: 18px; font-weight: 600; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; gap: 8px; }
.sidebar .logo .icon { width: 28px; height: 28px; background: var(--primary); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 14px; }
.sidebar nav { padding: 8px 0; }
.sidebar nav a { display: flex; align-items: center; gap: 10px; padding: 10px 16px; color: rgba(255,255,255,0.7); text-decoration: none; font-size: 14px; border-radius: 6px; margin: 2px 8px; transition: all .2s; }
.sidebar nav a:hover { background: rgba(255,255,255,0.1); color: white; }
.sidebar nav a.active { background: var(--primary); color: white; }
.main { margin-left: 240px; padding: 24px 32px; min-height: 100vh; }
.page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
.page-header h1 { font-size: 22px; font-weight: 600; }
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; transition: all .2s; font-family: inherit; }
.btn-primary { background: var(--primary); color: white; }
.btn-primary:hover { background: #3C3489; }
.btn-success { background: var(--success); color: white; }
.btn-outline { background: transparent; border: 1px solid var(--gray-200); color: var(--gray-600); }
.btn-outline:hover { border-color: var(--primary); color: var(--primary); }
.card { background: white; border-radius: 12px; border: 1px solid var(--gray-200); padding: 16px; margin-bottom: 16px; }
.card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.card-title { font-size: 16px; font-weight: 600; }
.form-group { margin-bottom: 16px; }
.form-group label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 6px; }
.form-group select { width: 100%; padding: 8px 12px; border: 1px solid var(--gray-200); border-radius: 8px; font-size: 14px; outline: none; }
.form-group select:focus { border-color: var(--primary); }
.code-block { background: #1e1e2e; color: #cdd6f4; border-radius: 12px; padding: 16px; font-family: "SF Mono", "Fira Code", monospace; font-size: 13px; white-space: pre-wrap; max-height: 500px; overflow-y: auto; line-height: 1.6; }
.tabs { display: flex; gap: 0; border-bottom: 2px solid var(--gray-200); margin-bottom: 16px; }
.tab { padding: 10px 20px; font-size: 14px; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px; color: var(--gray-400); transition: all .2s; }
.tab:hover { color: var(--primary); }
.tab.active { color: var(--primary); border-bottom-color: var(--primary); font-weight: 600; }
.tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 12px; }
.tag-purple { background: var(--primary-bg); color: var(--primary); }
.tag-green { background: var(--success-bg); color: var(--success); }
.toast { position: fixed; top: 20px; right: 20px; padding: 12px 20px; border-radius: 8px; font-size: 14px; z-index: 300; transform: translateX(120%); transition: transform .3s; }
.toast.show { transform: translateX(0); }
.toast-success { background: var(--success-bg); color: var(--success); border: 1px solid var(--success-light); }
.toast-error { background: var(--danger-bg); color: var(--danger); border: 1px solid var(--danger-light); }
.toast-info { background: var(--primary-bg); color: var(--primary); border: 1px solid var(--primary-light); }
</style>
</head>
<body>

<div class="sidebar">
  <div class="logo"><div class="icon">B</div><span>宝信 API 平台</span></div>
  <nav>
    <a href="/" id="nav-api"><div class="nav-icon" style="width:20px;text-align:center">🔌</div><span>接口管理</span></a>
    <a href="/cases" id="nav-cases"><div class="nav-icon" style="width:20px;text-align:center">📋</div><span>用例管理</span></a>
    <a href="/runner" id="nav-runner"><div class="nav-icon" style="width:20px;text-align:center">▶</div><span>测试执行</span></a>
    <a href="/generator" class="active" id="nav-generator"><div class="nav-icon" style="width:20px;text-align:center">⚡</div><span>代码生成</span></a>
  </nav>
</div>

<div class="main">
  <div class="page-header">
    <div><h1>代码生成</h1><div style="color:var(--gray-400);font-size:14px">根据配置的接口自动生成Python API封装代码和测试用例</div></div>
  </div>

  <div class="card">
    <div class="card-header">
      <div class="card-title">选择模块</div>
    </div>
    <div class="form-group">
      <label>业务模块</label>
      <select id="gen-module-select">
        <option value="">请选择要生成代码的模块</option>
      </select>
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-primary" onclick="generateCode()">生成代码</button>
      <button class="btn btn-success" id="save-btn" onclick="saveCode()" style="display:none">保存到项目</button>
    </div>
  </div>

  <!-- 生成结果 -->
  <div id="gen-result" style="display:none">
    <div class="card">
      <div class="card-header">
        <div style="display:flex;align-items:center;gap:8px">
          <span class="tag tag-purple" id="gen-module-name"></span>
          <span style="color:var(--gray-400)">接口数: <strong id="gen-api-count" style="color:var(--primary)">0</strong></span>
        </div>
      </div>
    </div>

    <div class="tabs">
      <div class="tab active" onclick="switchGenTab('api')">API封装代码</div>
      <div class="tab" onclick="switchGenTab('test')">测试用例代码</div>
    </div>

    <div id="api-code-panel">
      <div class="card">
        <div class="card-header">
          <div class="card-title">utilss/模块名/模块名.py</div>
          <button class="btn btn-outline" onclick="copyCode('api-code')">复制</button>
        </div>
        <div class="code-block" id="api-code"></div>
      </div>
    </div>
    <div id="test-code-panel" style="display:none">
      <div class="card">
        <div class="card-header">
          <div class="card-title">cases/模块名/test_模块名.py</div>
          <button class="btn btn-outline" onclick="copyCode('test-code')">复制</button>
        </div>
        <div class="code-block" id="test-code"></div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let generatedData = null;

async function init() {
  const res = await fetch('/api/modules');
  const data = await res.json();
  const select = document.getElementById('gen-module-select');
  (data.modules || []).forEach(m => {
    select.innerHTML += `<option value="${m.id}">${m.name} (${m.apiCount || 0}个接口)</option>`;
  });
}

async function generateCode() {
  const moduleId = document.getElementById('gen-module-select').value;
  if (!moduleId) { showToast('请选择模块', 'error'); return; }
  
  const res = await fetch(`/api/generate/module/${moduleId}`, {method: 'POST'});
  const data = await res.json();
  
  if (!data.success) { showToast(data.msg, 'error'); return; }
  
  generatedData = data;
  
  document.getElementById('gen-result').style.display = 'block';
  document.getElementById('gen-module-name').textContent = data.moduleName;
  document.getElementById('gen-api-count').textContent = data.apiCount;
  document.getElementById('api-code').textContent = data.apiCode;
  document.getElementById('test-code').textContent = data.testCode;
  document.getElementById('save-btn').style.display = 'inline-flex';
  
  showToast(`已生成 ${data.apiCount} 个接口的代码`);
}

async function saveCode() {
  if (!generatedData) return;
  
  const res = await fetch('/api/generate/save', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      moduleName: generatedData.moduleName,
      apiCode: generatedData.apiCode,
      testCode: generatedData.testCode
    })
  });
  const data = await res.json();
  
  if (data.success) {
    showToast('代码已保存到项目文件', 'info');
    document.getElementById('save-btn').style.display = 'none';
  } else {
    showToast('保存失败', 'error');
  }
}

function switchGenTab(tab) {
  document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
  if (tab === 'api') {
    document.querySelector('.tab:nth-child(1)').classList.add('active');
  } else {
    document.querySelector('.tab:nth-child(2)').classList.add('active');
  }
  document.getElementById('api-code-panel').style.display = tab === 'api' ? 'block' : 'none';
  document.getElementById('test-code-panel').style.display = tab === 'test' ? 'block' : 'none';
}

function copyCode(id) {
  const text = document.getElementById(id).textContent;
  navigator.clipboard.writeText(text).then(() => showToast('已复制到剪贴板'));
}

function showToast(msg, type='success') {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.className = `toast toast-${type} show`;
  setTimeout(() => toast.classList.remove('show'), 3000);
}

init();
</script>
</body>
</html>
